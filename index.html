<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SHIM - Format HOLDS List</title>
    <link rel="stylesheet" href="css/styles.css">
    <style id="print-page-style"></style>
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">SHIM</p>
        <h1>Sorting Holds Interface Module</h1>
      </div>
      <img class="header-logo" src="assets/images/logoNamewcllogo_med.png" alt="Washoe County Library System">
    </header>

    <main>
      <section class="branch-panel" aria-label="Branch profile selection">
        <div>
          <p class="eyebrow">Branch Profile</p>
          <h2 id="active-branch-name">MVP</h2>
        </div>
        <div class="branch-controls">
          <div id="branch-selector" class="branch-selector" role="radiogroup" aria-label="Branch profiles"></div>
          <button id="branch-settings-button" class="icon-button" type="button" aria-label="Open branch sorting settings">Settings</button>
        </div>
      </section>

      <section id="paste-screen" class="workspace">
        <div class="section-heading">
          <h2>Format HOLDS List</h2>
          <p>Paste copied Koha holds queue text.</p>
        </div>

        <label class="input-label" for="koha-input">Koha holds queue text</label>
        <textarea id="koha-input" spellcheck="false" autocomplete="off"></textarea>

        <div class="actions">
          <button id="format-button" class="primary-button" type="button">Format HOLDS List</button>
          <button id="clear-button" class="secondary-button" type="button">Clear</button>
        </div>
      </section>

      <section id="results-screen" class="workspace is-hidden" aria-live="polite">
        <div class="results-toolbar">
          <div>
            <p class="eyebrow">Formatted HOLDS List</p>
            <h2 id="results-title">Verification</h2>
          </div>
          <div class="actions">
            <button id="print-button" class="primary-button" type="button">Print</button>
            <button id="new-paste-button" class="secondary-button" type="button">New Paste</button>
          </div>
        </div>

        <section id="verification-report" class="report" aria-label="Verification report"></section>
        <section id="warnings-report" class="warnings is-hidden" aria-label="Warnings"></section>
        <section id="holds-output" class="holds-output" aria-label="Formatted holds list"></section>
      </section>
    </main>

    <div id="settings-modal" class="modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="modal-panel">
        <div class="modal-heading">
          <div>
            <p class="eyebrow">Branch Settings</p>
            <h2 id="settings-title">Sorting order</h2>
          </div>
          <button id="close-settings-button" class="icon-button" type="button" aria-label="Close settings">Close</button>
        </div>
        <p class="settings-note">Move groups into the order staff should work through the shelves. These experimental settings save in this browser.</p>
        <ol id="group-order-list" class="group-order-list"></ol>
        <div class="settings-actions">
          <button id="save-settings-button" class="primary-button" type="button">Save Settings</button>
          <button id="reset-settings-button" class="secondary-button" type="button">Reset Branch</button>
          <button id="export-settings-button" class="secondary-button" type="button">Export JSON</button>
        </div>
        <label class="input-label" for="import-settings-text">Import JSON</label>
        <textarea id="import-settings-text" class="settings-import" spellcheck="false"></textarea>
        <div class="actions">
          <button id="import-settings-button" class="secondary-button" type="button">Import JSON</button>
        </div>
      </div>
    </div>

    <script src="js/profile.js"></script>
    <script src="js/profileStore.js"></script>
    <script src="js/core.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
